<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conectando...</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    color:#00ff88;
    font-family:Arial;
    text-align:center;
}

#texto{
    font-size:28px;
}
</style>

</head>

<body>

<div id="texto">Conectando al sistema...</div>

<script>

let porcentaje = 0;

let intervalo = setInterval(function(){

porcentaje += 10;

document.getElementById("texto").innerHTML =
"Accediendo a tus memes... " + porcentaje + "%";

if(porcentaje >= 100){

clearInterval(intervalo);

document.getElementById("texto").innerHTML =
"😂 ¡Broma!<br><br>Solo abriste un link de prueba.";

}

},400);

</script>

</body>
</html>
